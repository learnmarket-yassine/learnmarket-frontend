name: Deploy to PRODUCTION

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-production" to confirm'
        required: true
        type: string

# Don't cancel prod deployments
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  # ============================================
  # JOB 1: Validation
  # ============================================
  validate:
    name: Validate confirmation
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Verify confirmation
        if: github.event.inputs.confirm != 'deploy-production'
        run: |
          echo "You must type 'deploy-production' to confirm"
          exit 1
      
      - name: Confirmation accepted
        run: echo "Production deployment confirmed"
  
  # ============================================
  # JOB 2: Pre-deployment tests
  # ============================================
  pre-deploy:
    name: Pre-deployment Tests
    runs-on: ubuntu-latest
    if: always() && (needs.validate.result == 'success' || github.event_name == 'push')
    needs: [validate]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Format check
        run: npm run format:check
      
      - name: Lint
        run: npm run lint
      
      - name: TypeScript check
        run: npm run type-check
      
      - name: Security audit
        run: npm audit --audit-level=high --production
        continue-on-error: true
  
  # ============================================
  # JOB 3: Production deployment
  # ============================================
  deploy:
    name: Deploy to PRODUCTION
    runs-on: ubuntu-latest
    needs: [pre-deploy]
    
    environment:
      name: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Build for PRODUCTION
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME: LearnMarket
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_ENVIRONMENT: production
        run: npm run build
      
      - name: Build size check
        run: |
          BUILD_SIZE=$(du -sh dist/ | cut -f1)
          echo "Build size: $BUILD_SIZE"
          
          # Vérifier que le build n'est pas trop gros (warning si >5MB)
          SIZE_BYTES=$(du -sb dist/ | cut -f1)
          if [ $SIZE_BYTES -gt 5242880 ]; then
            echo "Warning: Build size is over 5MB"
          fi
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
      
      - name: Backup current production (optional)
        run: |
          BACKUP_BUCKET="${{ secrets.S3_BUCKET }}-backups"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          
          echo "Creating backup of current production..."
          aws s3 sync s3://${{ secrets.S3_BUCKET }}/ s3://$BACKUP_BUCKET/$TIMESTAMP/ \
            --quiet || echo "Backup skipped (bucket might not exist)"
      
      - name: Deploy static assets to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "asset-manifest.json" \
            --exclude "robots.txt" \
            --exclude "sitemap.xml"
      
      - name: Deploy HTML files to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --include "*.html" \
            --exclude "*" \
            --include "index.html"
      
      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          
          echo "Invalidation created: $INVALIDATION_ID"
          
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id $INVALIDATION_ID
          
          echo "Cache invalidated"
      
      - name:  Smoke test production
        run: |
          echo "Running smoke tests..."
          sleep 15
          
          # Test 1: Homepage loads
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.FRONTEND_URL }})
          if [ "$HTTP_CODE" = "200" ]; then
            echo " Homepage: HTTP $HTTP_CODE"
          else
            echo " Homepage failed: HTTP $HTTP_CODE"
            exit 1
          fi
          
          # Test 2: HTTPS works
          if curl -s -I ${{ secrets.FRONTEND_URL }} | grep -i "strict-transport-security"; then
            echo " HTTPS/HSTS active"
          fi
          
          # Test 3: Asset loads
          if curl -s ${{ secrets.FRONTEND_URL }} | grep -q "LearnMarket"; then
            echo " Content loaded"
          fi
      
      - name:  Production deployment summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## PRODUCTION Deployment Successful
          
          ### Details
          | Field | Value |
          |-------|-------|
          | Environment | production |
          | URL | ${{ secrets.FRONTEND_URL }} |
          | Commit | \`${{ github.sha }}\` |
          | Branch | \`${{ github.ref_name }}\` |
          | Deployed by | ${{ github.actor }} |
          | Timestamp | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |
          
          ### Smoke tests
          - Homepage loads
          - HTTPS active
          - Content rendered
          
          [View site](${{ secrets.FRONTEND_URL }})
          EOF
  
  # ============================================
  # JOB 4: Rollback ready
  # ============================================
  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    
    steps:
      - name: Deployment success notification
        run: |
          echo "Production deployment completed successfully"
          echo "${{ secrets.FRONTEND_URL }}"