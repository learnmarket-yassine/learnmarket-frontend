name: Deploy to DEV

on:
  push:
    branches: [develop]
  workflow_dispatch:

# Cancel previous deployments to dev
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    
    environment:
      name: development
      url: ${{ secrets.FRONTEND_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Quick lint check
        run: npm run lint
      
      - name: TypeScript check
        run: npm run type-check
      
      - name: Build for DEV
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME: LearnMarket
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_ENVIRONMENT: development
        run: npm run build
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
      
      - name: Deploy static assets to S3
        run: |
          # Assets avec hash : cache long (1 an)
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "asset-manifest.json" \
            --exclude "robots.txt" \
            --exclude "sitemap.xml"
      
      - name: Deploy HTML files to S3
        run: |
          # HTML : pas de cache (toujours fresh)
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --include "*.html" \
            --exclude "*" \
            --include "index.html"
      
      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          
          echo "Invalidation created: $INVALIDATION_ID"
          
          echo "Waiting for invalidation to complete..."
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id $INVALIDATION_ID
          
          echo "Cache invalidated successfully"
      
      - name: Verify deployment
        run: |
          echo "Frontend URL: ${{ secrets.FRONTEND_URL }}"
          echo "Checking site availability..."
          
          # Attendre 10s pour la propagation
          sleep 10
          
          # Test HTTP
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.FRONTEND_URL }} || echo "000")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Site is up (HTTP $HTTP_CODE)"
          else
            echo "Site returned HTTP $HTTP_CODE"
          fi
      
      - name: Create deployment summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## DEV Deployment Successful
          
          **Environment**: development
          **URL**: ${{ secrets.FRONTEND_URL }}
          **Commit**: \`${{ github.sha }}\`
          **Branch**: \`${{ github.ref_name }}\`
          **Triggered by**: ${{ github.actor }}
          **Timestamp**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF